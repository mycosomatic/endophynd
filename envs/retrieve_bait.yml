name: endophynd-retrieve-bait
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - awscli>=2.0
  - zstd>=1.5            # provides zstdcat
  - bbmap                # bbduk.sh lives here; bioconda package is bbmap not bbtools
  - fastp>=0.23          # PE QC + merge (Phase 3, Illumina path)
  - sra-tools>=3.0       # SRA streaming (Phase 3)
