# Endophynd runtime parameters
# Edit this file to configure a run. See endophynd_development_plan.md for details.

# --- Input ---
samplesheet: "workflow/config/samplesheet.csv"

# --- Cache ---
cache_config: "workflow/config/cache.yml"

# --- Baiting (bbduk) ---
bait:
  seed_ref: "resources/rrna_seeds.fa"   # conserved rDNA k-mer seed set
  k: 31
  hdist: 1
  minlength: 100                         # discard reads shorter than this after baiting (100 suits PE151 SRA reads)

bait_threads: 4                          # threads for bbduk; raise on multi-core machines

# Per-platform bait overrides applied at runtime in retrieve_and_bait.
# minlength and minavgquality are set in the Snakefile shell block; these
# are documentation of the defaults — edit the Snakefile to change them.
#
# platform       minlength  minavgquality  paired   classification ceiling
# ---------------------------------------------------------------------------
# illumina         100          —           yes      species (UNITE/SILVA)
# pacbio-hifi      500         Q30          no       species (Q30-40 CCS)
# pacbio-clr       500         Q15          no       genus only (Q10-15)
# ont              500         Q15          no       genus-species (Q10-30, variable)
#                                                    flag species calls if median Q<20

# --- Locus annotation (ITSx) ---
itsx:
  organisms: "F"          # ITSx organism code: F = Fungi only (faster than 'all')
  cpu: 4

# --- Gating ---
gate:
  calibration_map: "workflow/config/calibration_map.yml"
  # Fallback thresholds used until the calibration map is built (Phase 1.5).
  # These are guesses; DO NOT use for publication.
  # Calibrated for Logan unitigs (~30-65 bp rDNA windows): thresholds much
  # lower than amplicon thresholds.  See docs/decisions.md for rationale.
  fallback_thresholds:
    ITS:                  # BLAST assigns ITS1+5.8S+ITS2 together as "ITS"
      coarse_min_bp: 30   # single k-mer hit; kingdom/phylum only
      fine_min_bp: 50     # 50 bp ITS → genus-level with UNITE
    ITS1:
      coarse_min_bp: 30
      fine_min_bp: 50
    ITS2:
      coarse_min_bp: 30
      fine_min_bp: 50
    "5.8S":
      coarse_min_bp: 0   # conserved only — classify coarsely regardless
      fine_min_bp: 0
    LSU:
      coarse_min_bp: 40
      fine_min_bp: 60
    SSU:
      coarse_min_bp: 40
      fine_min_bp: 60

# --- Dereplication (vsearch) ---
derep:
  min_size: 1                           # keep singletons in MVP; tune after calibration
  identity: 0.97                        # 97% clustering fallback if exact derep too fragmented

# --- Classification ---
# DB paths are relative to db_dir (see cache.yml).
classify:
  # ITS: VALIDATED discovery classifier (D30). blastn vs the UNITE BLAST DB built by
  # scripts/build_unite_db.sh. The fungal/non-fungal call is made by BLAST identity
  # over the ITSx-extracted ITS — NOT q2-feature-classifier/sintax, which labels every
  # query Fungi against a Fungi-only reference and so cannot reject host-plant ITS.
  ITS:
    method: blastn
    db: "unite/unite_blast"           # built by scripts/build_unite_db.sh (UNITE v10.0)
    min_identity: 90                  # percent-identity floor for a confident fungal call
    min_qcov: 60                      # percent query-coverage floor
  # SSU/LSU (SILVA) classification is not yet implemented — placeholders only.
  SSU:
    method: phyloFlash
    db: "silva/138.1/SSU"             # placeholder
  LSU:
    method: q2-feature-classifier
    db: "silva/138.1/LSU"             # placeholder

classify_threads: 4                   # threads for blastn in the classify rule

# --- Output ---
output:
  results_dir: null                     # overridden to cold_dir/results at runtime
  run_id: null                          # set by CLI or auto-generated from timestamp

# --- Workflow behavior ---
max_parallel_accessions: 4
delete_transient_after_classify: true   # process-then-delete; set false only for debugging

# --- Targeted search (capability B: `endophynd target`) ---
# Reference inversion (D05): the query is the reference; each target streams
# through it. These are CLI defaults; every key is overridable on the command line.
target:
  source: auto             # auto | logan | sra | local (auto: Logan if present, else SRA)
  query_type: auto         # auto | genome | rdna  (rdna → blastn; genome → minimap2)
  aligner: auto            # auto | minimap2 | blastn
  min_identity: 0.80       # keep hits at >= this identity (0-1)
  min_aln_len: 50          # keep hits at >= this alignment length (bp)
  min_query_cov: 0.0       # keep hits covering >= this fraction of the query record
  minimap2_preset: asm20   # -x preset; provisional pending mock-community calibration (§12)
  max_target_seqs: 5       # blastn: max query records reported per dataset read
  evalue: 1.0e-5           # blastn e-value cutoff
  jobs: 4                  # parallel targets streamed at once
  threads: 4               # threads per aligner invocation
